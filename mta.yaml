_schema-version: "3.1"
ID: sap-performance-dashboard
version: 1.0.0
description: "SAP Performance Dashboard - CAP + React"

modules:

  # ── CAP Backend ───────────────────────────────────────────────────────────
  - name: performance-backend
    type: nodejs
    path: backend
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    build-parameters:
      builder: npm
      ignore:
        - node_modules/
        - gen/
        - .cdsrc-private.json
    requires:
      - name: performance-db
      - name: performance-uaa
    provides:
      - name: backend-api
        properties:
          backend-url: ${default-url}

  # ── HANA DB Deployer (deploys HDI artifacts generated by cds build) ───────
  - name: performance-db-deployer
    type: hdb
    path: backend/gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: performance-db

  # ── React Frontend ─────────────────────────────────────────────────────────
  - name: performance-frontend
    type: html5
    path: .
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build
    requires:
      - name: performance-html5-repo-host

resources:

  - name: performance-db
    type: org.cloudfoundry.managed-service
    parameters:
      service: hana
      service-plan: hdi-shared

  - name: performance-uaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: backend/xs-security.json

  - name: performance-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
